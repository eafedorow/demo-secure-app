<mat-card class="hero">
  <mat-card-content>

    <h1>
      Angular Security Demo App
    </h1>

    <p>
      Демонстрация распространённых
      frontend-уязвимостей и способов
      их устранения.
    </p>

  </mat-card-content>
</mat-card>

<div class="cards-grid">
  @for (theme of themes; track theme.id) {
    <mat-card
      class="demo-card"
    >
      <mat-card-header>
        <mat-icon>{{ theme.icon }}</mat-icon>

        <mat-card-title>
          {{ theme.title }}
        </mat-card-title>
      </mat-card-header>

      <mat-card-content>
        {{ theme.description }}
      </mat-card-content>

      <mat-card-actions>
        <button mat-button>
          Open
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
